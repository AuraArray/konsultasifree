<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard | Elevatio - AuraArray</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.4); backdrop-filter: blur(20px); }
        .log-card { background: #0f172a; border: 1px solid #1e293b; transition: all 0.3s ease; }
        .log-card:hover { border-color: #334155; transform: translateX(5px); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div id="login-gate" class="max-w-md mx-auto mt-20 glass-card p-10 rounded-[2.5rem] text-center">
        <h1 class="text-xl font-black italic mb-6 tracking-widest text-white uppercase">Elevatio Auth</h1>
        <input type="password" id="pass-admin" placeholder="Security Password" 
            class="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 text-white text-center outline-none focus:border-slate-600 mb-6">
        <button onclick="handleLogin()" class="w-full bg-white text-slate-950 font-black p-4 rounded-xl hover:bg-slate-200 transition uppercase tracking-widest text-xs">
            Authorize Access
        </button>
        <p id="err-msg" class="text-red-500 text-[10px] mt-4 hidden uppercase font-bold tracking-widest">Akses Ditolak!</p>
    </div>

    <div id="main-dash" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white">AURAARRAY MGMT</h1>
                <p class="text-slate-500 text-xs uppercase tracking-[0.3em] mt-1">Project Monitoring System</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-bold text-slate-500 border border-slate-800 px-6 py-2 rounded-full hover:bg-slate-900 transition uppercase tracking-widest">
                Logout
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <div class="lg:col-span-2 space-y-6">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-4">Inbound Leads</h2>
                <div id="log-container" class="space-y-4">
                    </div>
            </div>

            <div class="space-y-8">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-4">Master Pricing</h2>
                <div id="price-editor" class="glass-card p-8 rounded-3xl space-y-6 border-slate-800">
                    </div>
                <button onclick="updatePrices()" class="w-full bg-slate-100 text-slate-900 font-black p-4 rounded-xl hover:bg-white transition shadow-xl shadow-white/5 uppercase tracking-widest text-xs">
                    Save Price Settings
                </button>
                <button onclick="clearLogs()" class="w-full text-red-500/50 text-[10px] font-bold uppercase tracking-widest hover:text-red-500 transition py-4">
                    Clear All Logs
                </button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function handleLogin() {
            const input = document.getElementById('pass-admin').value;
            if(validateAdmin(input)) {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('main-dash').classList.remove('hidden');
                renderDashboard();
            } else {
                document.getElementById('err-msg').classList.remove('hidden');
            }
        }

        function renderDashboard() {
            // 1. Render Riwayat Konsultasi (Logs)
            const logs = JSON.parse(localStorage.getItem('auraArray_logs') || "[]").reverse();
            const logContainer = document.getElementById('log-container');
            
            logContainer.innerHTML = logs.map(l => `
                <div class="log-card p-6 rounded-2xl">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-bold text-slate-500 block uppercase mb-1">${l.date}</span>
                            <h3 class="text-lg font-bold text-white">${l.nama} <span class="text-slate-500 font-normal text-sm ml-2">(${l.wa})</span></h3>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black text-sky-500 uppercase tracking-widest block">${l.kategori}</span>
                            <span class="text-xl font-black text-white">${l.estimasi}</span>
                        </div>
                    </div>
                    <p class="text-slate-400 text-sm leading-relaxed italic border-t border-slate-800 pt-4">"${l.pesan}"</p>
                </div>
            `).join('') || `<div class="text-center py-20 text-slate-600 italic text-sm">Belum ada data masuk dari klien.</div>`;

            // 2. Render Price Editor
            const p = getActivePrices();
            const editor = document.getElementById('price-editor');
            const fields = [
                { id: 'landing', label: 'Landing Page' },
                { id: 'webProfil', label: 'Web Profile' },
                { id: 'webApp', label: 'Web App/System' },
                { id: 'fiturLogin', label: 'Auth System' },
                { id: 'fiturPayment', label: 'Payment Integration' }
            ];

            editor.innerHTML = fields.map(f => `
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">${f.label}</label>
                    <input type="number" id="price-${f.id}" value="${p[f.id]}" 
                        class="w-full p-3 rounded-xl bg-slate-900 border border-slate-800 text-white font-bold outline-none focus:border-slate-600">
                </div>
            `).join('');
        }

        function updatePrices() {
            const newP = {
                landing: parseInt(document.getElementById('price-landing').value),
                webProfil: parseInt(document.getElementById('price-webProfil').value),
                webApp: parseInt(document.getElementById('price-webApp').value),
                fiturLogin: parseInt(document.getElementById('price-fiturLogin').value),
                fiturPayment: parseInt(document.getElementById('price-fiturPayment').value)
            };
            localStorage.setItem('auraArray_prices', JSON.stringify(newP));
            alert("Harga Master Berhasil Diperbarui! ✅");
        }

        function clearLogs() {
            if(confirm("Hapus semua riwayat konsultasi klien?")) {
                localStorage.removeItem('auraArray_logs');
                renderDashboard();
            }
        }
    </script>
</body>
</html>
