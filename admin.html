<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Elevatio - AuraArray</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-gradient-admin {
            background: linear-gradient(135deg, #001F3F 0%, #001a35 100%);
        }
    </style>
</head>
<body class="bg-gradient-admin min-h-screen text-white font-sans flex items-center justify-center p-6">

    <div id="loginSection" class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md text-center border-t border-sky-500/30">
        <div class="mb-6 inline-block p-4 bg-sky-500/10 rounded-2xl">
            <svg class="w-12 h-12 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-3xl font-bold mb-1 text-white">Admin Access</h1>
        <p class="text-sky-300 text-xs uppercase tracking-widest mb-8">Elevatio - AuraArray</p>
        
        <div class="text-left mb-6">
            <label class="block text-xs text-blue-300 mb-2 ml-1 uppercase font-bold">Security Password</label>
            <input type="password" id="passInput" placeholder="••••••••" 
                class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-white placeholder-blue-700 focus:outline-none focus:ring-2 focus:ring-sky-400 transition-all">
        </div>
        
        <button onclick="handleLogin()" 
            class="w-full bg-sky-500 hover:bg-sky-400 text-navy-900 font-black py-4 rounded-xl transition duration-300 shadow-xl shadow-sky-500/20 uppercase tracking-wider">
            Authorize & Enter
        </button>
        <p id="errorLabel" class="text-red-400 mt-4 text-xs hidden">⚠ Akses Ditolak: Password Salah!</p>
    </div>

    <div id="dashboardSection" class="glass p-8 md:p-12 rounded-3xl shadow-2xl w-full max-w-5xl hidden border-t border-sky-400/20">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-sky-300 tracking-tight">Price Management</h2>
                <p class="text-blue-200 text-sm">Update harga layanan Elevatio - AuraArray</p>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 hover:bg-red-500 text-red-400 hover:text-white px-6 py-2 rounded-xl text-xs font-bold transition-all border border-red-500/20">
                Logout & Lock
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                <h3 class="font-bold text-lg text-blue-100 mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-sky-400 rounded-full"></span> Harga Dasar
                </h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-blue-300 mb-2 uppercase">Landing Page (Rp)</label>
                        <input type="number" id="baseLanding" class="w-full bg-black/30 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-sky-400 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-300 mb-2 uppercase">Web Profil (Rp)</label>
                        <input type="number" id="baseWebProfil" class="w-full bg-black/30 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-sky-400 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-300 mb-2 uppercase">Web App / SaaS (Rp)</label>
                        <input type="number" id="baseWebApp" class="w-full bg-black/30 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-sky-400 outline-none transition">
                    </div>
                </div>
            </div>

            <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                <h3 class="font-bold text-lg text-blue-100 mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-purple-400 rounded-full"></span> Biaya Fitur
                </h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-blue-300 mb-2 uppercase">Sistem Login (Rp)</label>
                        <input type="number" id="featLogin" class="w-full bg-black/30 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-sky-400 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-300 mb-2 uppercase">Payment Gateway (Rp)</label>
                        <input type="number" id="featPay" class="w-full bg-black/30 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-sky-400 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-300 mb-2 uppercase">Admin Dashboard (Rp)</label>
                        <input type="number" id="featAdmin" class="w-full bg-black/30 border border-white/10 rounded-xl p-4 focus:ring-2 focus:ring-sky-400 outline-none transition">
                    </div>
                </div>
            </div>
        </div>

        <button onclick="saveAllPrices()" class="mt-10 w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl transition shadow-xl shadow-green-500/20">
            SIMPAN SEMUA PERUBAHAN
        </button>
        
        <p class="text-center text-[10px] text-blue-400/40 mt-10 uppercase tracking-widest">
            System Architecture by <span class="text-sky-400 font-bold">Elevatio - AuraArray</span>
        </p>
    </div>

    <script src="script.js"></script>

    <script>
        function handleLogin() {
            const input = document.getElementById('passInput').value;
            // Memanggil fungsi dari script.js
            if(validateAdmin(input)) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                initAdminValues();
            } else {
                document.getElementById('errorLabel').classList.remove('hidden');
                document.getElementById('passInput').value = "";
            }
        }

        function initAdminValues() {
            const current = getActivePrices();
            document.getElementById('baseLanding').value = current.landing;
            document.getElementById('baseWebProfil').value = current.webProfil;
            document.getElementById('baseWebApp').value = current.webApp;
            document.getElementById('featLogin').value = current.featLogin;
            document.getElementById('featPay').value = current.featPay;
            document.getElementById('featAdmin').value = current.featAdmin;
        }

        function saveAllPrices() {
            const newPrices = {
                landing: parseInt(document.getElementById('baseLanding').value),
                webProfil: parseInt(document.getElementById('baseWebProfil').value),
                webApp: parseInt(document.getElementById('baseWebApp').value),
                featLogin: parseInt(document.getElementById('featLogin').value),
                featPay: parseInt(document.getElementById('featPay').value),
                featAdmin: parseInt(document.getElementById('featAdmin').value)
            };
            localStorage.setItem('myProjectPrices', JSON.stringify(newPrices));
            alert("✅ Data Berhasil Diperbarui!");
        }
    </script>
</body>
</html>
