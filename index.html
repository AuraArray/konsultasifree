<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevatio - AuraArray | Smart Digital Consultation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(51, 65, 85, 0.4); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .nav-btn { 
            color: #94a3b8; 
            transition: all 0.3s ease; 
            font-size: 0.7rem; 
            font-weight: 700; 
            letter-spacing: 0.15em; 
        }
        .nav-btn:hover { color: #f8fafc; }
        .nav-btn.active { color: #f8fafc; border-bottom: 2px solid #334155; padding-bottom: 4px; }
        
        /* Custom Input Styling */
        input, textarea { 
            background: #0f172a !important; 
            border: 1px solid #1e293b !important; 
            color: #ffffff !important; 
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus { 
            border-color: #475569 !important; 
            ring: 2px rgba(71, 85, 105, 0.2);
            outline: none;
        }
        ::placeholder { color: #475569; }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="fixed top-0 w-full px-8 py-6 flex justify-between items-center border-b border-slate-900 bg-slate-950/80 z-50">
        <div class="text-xl font-black tracking-tighter italic text-white uppercase">Elevatio</div>
        <div class="flex gap-8">
            <button onclick="window.location.reload()" class="nav-btn active">KONSULTASI</button>
            <button onclick="window.location.href='admin.html'" class="nav-btn">MANAGEMENT</button>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20 px-6 flex justify-center items-center">
        <div class="w-full max-w-2xl">
            
            <div id="step-input" class="glass-card p-10 rounded-[2.5rem] fade-in">
                <div class="mb-10">
                    <h1 class="text-4xl font-extrabold mb-3 tracking-tight">Halo, Saya Rizky.</h1>
                    <p class="text-slate-400 text-sm leading-relaxed">Ceritakan ide atau kebutuhan website Anda secara bebas. Saya akan menganalisis teknis dan estimasi biayanya untuk Anda.</p>
                </div>
                
                <div class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-black text-slate-500 tracking-widest ml-1">Identitas</label>
                            <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full p-4 rounded-2xl outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase font-black text-slate-500 tracking-widest ml-1">Kontak WhatsApp</label>
                            <input type="tel" id="wa" placeholder="08xxxxxxxxxx" class="w-full p-4 rounded-2xl outline-none">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black text-slate-500 tracking-widest ml-1">Deskripsi Proyek</label>
                        <textarea id="pesan" rows="6" placeholder="Contoh: Saya butuh website profil perusahaan untuk jasa konstruksi di Medan, yang ada galeri proyek dan formulir kontak..." 
                            class="w-full p-5 rounded-2xl outline-none resize-none leading-relaxed"></textarea>
                    </div>

                    <button onclick="mulaiAnalisa()" class="w-full bg-white text-slate-950 font-black p-5 rounded-2xl hover:bg-slate-200 transition-all transform active:scale-[0.98] shadow-xl shadow-white/5 uppercase tracking-widest text-sm">
                        Analyze My Project
                    </button>
                </div>
            </div>

            <div id="step-hasil" class="hidden glass-card p-10 rounded-[2.5rem] border-slate-700 fade-in">
                <div class="mb-10 text-center md:text-left">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-[0.3em]">Analysis Result</h2>
                    <div id="kategori-proyek" class="text-2xl font-bold text-white mb-1 italic opacity-80"></div>
                    <div id="estimasi-harga" class="text-5xl font-black text-white tracking-tighter"></div>
                </div>
                
                <div class="bg-slate-900/50 p-6 rounded-2xl border-l-4 border-slate-600 mb-10">
                    <p class="text-slate-300 text-sm leading-loose italic" id="deskripsi-hasil"></p>
                </div>
                
                <div class="flex flex-col gap-4">
                    <button onclick="kirimWhatsApp()" class="w-full bg-green-600 text-white font-bold p-5 rounded-2xl hover:bg-green-500 transition-all flex items-center justify-center gap-3 shadow-lg shadow-green-900/20">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981z"/></svg>
                        DISKUSI VIA WHATSAPP
                    </button>
                    <button onclick="window.location.reload()" class="text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:text-slate-300 transition">
                        Reset Analysis
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-8 text-center border-t border-slate-900">
        <p class="text-[9px] text-slate-600 uppercase tracking-[0.4em]">
            Developed with Integrity by <span class="text-slate-400 font-bold">Elevatio - AuraArray</span>
        </p>
    </footer>

    <script src="script.js"></script>
    <script>
        function mulaiAnalisa() {
            const nama = document.getElementById('nama').value.trim();
            const wa = document.getElementById('wa').value.trim();
            const pesan = document.getElementById('pesan').value.trim();

            if(!nama || !pesan) {
                alert("Mohon masukkan nama dan ceritakan kebutuhan proyek Anda.");
                return;
            }

            // Memanggil fungsi analisa dari script.js
            const hasil = analisaKebutuhan(pesan);
            
            // Simpan data ke log admin (LocalStorage) secara diam-diam
            saveLog({ 
                nama, 
                wa, 
                pesan, 
                kategori: hasil.kategori, 
                estimasi: toIDR(hasil.estimasi) 
            });

            // Transisi UI
            document.getElementById('step-input').classList.add('hidden');
            document.getElementById('step-hasil').classList.remove('hidden');
            
            // Tampilkan Hasil
            document.getElementById('kategori-proyek').innerText = hasil.kategori;
            document.getElementById('estimasi-harga').innerText = toIDR(hasil.estimasi);
            document.getElementById('deskripsi-hasil').innerText = `Kami telah meninjau deskripsi Anda: "${pesan.substring(0, 120)}${pesan.length > 120 ? '...' : ''}". Elevatio merekomendasikan solusi ${hasil.kategori} sebagai fondasi digital bisnis Anda.`;
            
            // Store global untuk WA
            window.sessionData = { nama, kategori: hasil.kategori, harga: toIDR(hasil.estimasi) };
        }

        function kirimWhatsApp() {
            const d = window.sessionData;
            const waOwner = "6281234567890"; // GANTI DENGAN NOMOR ANDA
            const msg = `Halo Elevatio! Nama saya ${d.nama}.%0A%0ASaya baru saja melakukan analisa proyek di website untuk *${d.kategori}*.%0AEstimasi: *${d.harga}*%0A%0AMari kita diskusikan lebih lanjut!`;
            window.open(`https://wa.me/${waOwner}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
